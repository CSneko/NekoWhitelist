<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NekoWhitelist 调试邮件</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f7fa; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7fa; padding: 40px 0;">
  <tr>
    <td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 4px 24px rgba(100,120,180,0.12);">
        <!-- Header -->
        <tr>
          <td style="background: linear-gradient(135deg, #7eb8da, #a0d2f0); padding: 32px 40px; text-align: center;">
            <h1 style="margin:0; font-size:26px; color:#ffffff; text-shadow:0 2px 4px rgba(0,0,0,0.08);">
              🔧 NekoWhitelist 调试邮件
            </h1>
            <p style="margin:8px 0 0 0; font-size:14px; color:#f0f6fb;">
              SMTP 配置测试
            </p>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding: 40px;">
            <p style="margin:0 0 16px 0; font-size:15px; color:#4a505a; line-height:1.7;">
              喵喵~ 你好呀！
            </p>
            <p style="margin:0 0 24px 0; font-size:15px; color:#4a505a; line-height:1.7;">
              这是一封来自 <strong style="color:#5a8fba;">NekoWhitelist</strong> 的调试测试邮件喵~<br>
              如果你收到了这封邮件，说明 SMTP 配置完全正确喵！
            </p>

            <!-- Info Box -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin: 0 0 24px 0;">
              <tr>
                <td style="background-color:#f5f8fb; border:2px solid #d0dff0; border-radius:12px; padding: 20px;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:4px 0; font-size:13px; color:#6a7a8a; width:90px;">🕐 发送时间</td>
                      <td style="padding:4px 0; font-size:13px; color:#3a4a5a;">{{timestamp}}</td>
                    </tr>
                    <tr>
                      <td style="padding:4px 0; font-size:13px; color:#6a7a8a;">📡 SMTP 服务器</td>
                      <td style="padding:4px 0; font-size:13px; color:#3a4a5a;">{{smtp_host}}</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

            <p style="margin:0 0 4px 0; font-size:14px; color:#5a8fba; font-weight:bold;">
              ✅ 一切正常喵！
            </p>
            <p style="margin:0; font-size:13px; color:#8a9aaa; line-height:1.6;">
              邮件服务已正确配置并可以正常发送邮件喵~
            </p>

            <hr style="border:none; border-top:1px solid #e8edf3; margin: 24px 0;">

            <p style="margin:0; font-size:12px; color:#a0aeb8; line-height:1.6;">
              这是一封自动生成的测试邮件，无需回复喵~
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background-color:#f5f7fa; padding: 20px 40px; text-align:center;">
            <p style="margin:0; font-size:12px; color:#b0bcc8;">
              🐱 NekoWhitelist 猫娘管理团队<br>
              <span style="color:#c0ccd8;">—— 守护每一只可爱玩家喵~</span>
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
